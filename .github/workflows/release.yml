name: Build and Release

on:
  push:
    branches:
      - master
      - main

jobs:
  build:
    name: Build (${{ matrix.artifact_name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: linux-x64
            artifact_path: app/build/compose/binaries/main/deb/*.deb
          - os: ubuntu-24.04-arm
            artifact_name: linux-arm64
            artifact_path: app/build/compose/binaries/main/deb/*.deb
          - os: windows-latest
            artifact_name: windows-x64
            artifact_path: app/build/compose/binaries/main/msi/*.msi
          - os: windows-2025
            artifact_name: windows-arm64
            artifact_path: app/build/compose/binaries/main/msi/*.msi
          - os: macos-latest
            artifact_name: macos-arm64
            artifact_path: app/build/compose/binaries/main/dmg/*.dmg
          - os: macos-13
            artifact_name: macos-x64
            artifact_path: app/build/compose/binaries/main/dmg/*.dmg

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 23
        uses: actions/setup-java@v4
        with:
          java-version: '23'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build and Package
        run: |
          chmod +x build.sh
          ./build.sh package
        shell: bash

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}-binaries
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Display structure of downloaded files
        run: ls -R artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}-${{ github.sha }}
          name: KDM Release ${{ github.run_number }}
          files: artifacts/**/*
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
